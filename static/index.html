<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Airport DB Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --panel: #111a2e;
    --panel-border: #1e2a45;
    --input-bg: #0e1626;
    --text: #e8ecf3;
    --text-muted: #7c89a3;
    --text-dim: #4d5872;
    --accent-blue: #2563eb;
    --accent-blue-hover: #1d4ed8;
    --accent-teal: #14b8a6;
    --ok-green: #22c55e;
    --err-red: #f43f5e;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
    padding: 40px 16px 64px;
  }

  .wrap { max-width: 800px; margin: 0 auto; }

  .header { margin-bottom: 28px; }
  .eyebrow {
    font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
    color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px;
  }
  h1 { font-size: 28px; font-weight: 800; margin: 0 0 8px; color: var(--text); }
  .subtitle { color: var(--text-muted); font-size: 14px; }

  .ask-card {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 14px;
  }

  .ask-row { display: flex; gap: 10px; }

  input[type="text"] {
    flex: 1;
    background: var(--input-bg);
    border: 1px solid var(--panel-border);
    color: var(--text);
    padding: 13px 16px;
    font-size: 14px;
    border-radius: 8px;
    outline: none;
    font-family: inherit;
  }
  input[type="text"]:focus { border-color: var(--accent-blue); }
  input[type="text"]::placeholder { color: var(--text-dim); }

  button.ask-btn {
    background: var(--accent-blue);
    color: white;
    border: none;
    padding: 0 24px;
    font-weight: 700;
    font-size: 13px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
  }
  button.ask-btn:hover { background: var(--accent-blue-hover); }
  button.ask-btn:disabled { background: #26344f; cursor: wait; color: var(--text-dim); }

  .examples { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
  .example-pill {
    font-size: 12px; color: var(--text-muted);
    background: var(--input-bg);
    border: 1px solid var(--panel-border);
    padding: 7px 12px; border-radius: 20px;
    cursor: pointer; transition: all 0.15s;
  }
  .example-pill:hover { border-color: var(--accent-blue); color: var(--text); }

  .panel {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 14px;
  }
  .panel .label {
    font-size: 10.5px; font-weight: 700; letter-spacing: 1.2px;
    text-transform: uppercase; color: var(--text-dim); margin-bottom: 10px;
  }
  .panel .label.ok { color: var(--accent-teal); }
  .panel .label.err { color: var(--err-red); }

  .sql-block {
    font-size: 13px; color: #74c0fc;
    white-space: pre-wrap; word-break: break-word; line-height: 1.6;
    font-family: 'SF Mono', Consolas, monospace;
  }
  .err-block { font-size: 13px; color: var(--err-red); line-height: 1.6; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td {
    text-align: left; padding: 9px 12px;
    border-bottom: 1px solid var(--panel-border);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px;
  }
  th { color: var(--text-muted); font-size: 10.5px; letter-spacing: 0.8px; text-transform: uppercase; font-weight: 700; }
  tr:hover td { background: #16203350; }
  .table-scroll { overflow-x: auto; }
  .row-count { font-size: 11.5px; color: var(--text-dim); margin-top: 12px; }
  .empty-state { color: var(--text-dim); font-size: 13px; }

  .runway-wrap {
    position: relative;
    height: 100px;
    margin: 8px 0 4px;
    overflow: hidden;
  }

  .runway-line {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 28px;
    height: 2px;
    background: repeating-linear-gradient(
      90deg,
      var(--panel-border) 0 16px,
      transparent 16px 30px
    );
  }

  .runway-plane {
    position: absolute;
    bottom: 30px;
    left: 24px;
    width: 30px;
    height: 30px;
    color: var(--accent-blue);
    animation: plane-idle 1.3s ease-in-out infinite;
  }

  .runway-plane svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  @keyframes plane-idle {
    0%, 100% { transform: translateY(0) rotate(90deg); }
    50%      { transform: translateY(-2px) rotate(88deg); }
  }

  .runway-plane.takeoff {
    animation: plane-takeoff 1s cubic-bezier(0.45, 0, 0.4, 1) forwards;
  }

  @keyframes plane-takeoff {
    0%   { transform: translate(0, 0) rotate(90deg); opacity: 1; }
    30%  { transform: translate(60px, 0) rotate(90deg); opacity: 1; }
    65%  { transform: translate(150px, -36px) rotate(68deg); opacity: 1; }
    100% { transform: translate(280px, -130px) rotate(55deg); opacity: 0; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="eyebrow">Text-to-SQL Prototype</div>
    <h1>Airport DB Console</h1>
    <div class="subtitle">Ask a question in plain English, get SQL + results</div>
  </div>

  <div class="ask-card">
    <div class="ask-row">
      <input type="text" id="question" placeholder="Ask about flights, gates, bookings, passengers..." autocomplete="off">
      <button class="ask-btn" id="askBtn">Ask</button>
    </div>
    <div class="examples">
      <span class="example-pill" onclick="fillAndAsk(this)">Which flights are delayed right now?</span>
      <span class="example-pill" onclick="fillAndAsk(this)">List today's arrivals</span>
      <span class="example-pill" onclick="fillAndAsk(this)">Which gates are in Terminal 1?</span>
      <span class="example-pill" onclick="fillAndAsk(this)">List all ground handling agencies</span>
    </div>
  </div>

  <div id="results"></div>
</div>

<script>
const API_BASE = window.location.origin;
const input = document.getElementById('question');
const askBtn = document.getElementById('askBtn');
const results = document.getElementById('results');

function fillAndAsk(el) {
  input.value = el.textContent;
  ask();
}

input.addEventListener('keydown', (e) => { if (e.key === 'Enter') ask(); });
askBtn.addEventListener('click', ask);

// Material Design "flight" glyph - a simple, recognizable side-view plane silhouette
const PLANE_SVG = `<svg viewBox="0 0 24 24" fill="currentColor">
  <path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2.5 1.5V22l4-1 4 1v-1.5L14 19v-5.5l7 2.5z"/>
</svg>`;

function showLoading() {
  results.innerHTML = `
    <div class="runway-wrap">
      <div class="runway-line"></div>
      <div class="runway-plane" id="runwayPlane">${PLANE_SVG}</div>
    </div>
  `;
}


function playTakeoff() {
  return new Promise((resolve) => {
    const plane = document.getElementById('runwayPlane');
    if (!plane) { resolve(); return; }
    plane.classList.add('takeoff');
    setTimeout(resolve, 1000); // matches the CSS animation duration
  });
}

async function ask() {
  const question = input.value.trim();
  if (!question) return;

  askBtn.disabled = true;
  askBtn.textContent = '...';
  showLoading();

  let ok = true;
  let data = null;

  try {
    const res = await fetch(`${API_BASE}/query`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question })
    });
    data = await res.json();
    ok = res.ok;
  } catch (err) {
    ok = false;
    data = { detail: String(err) };
  }

  await playTakeoff();

  if (ok) {
    renderResults(data);
  } else {
    renderError(data.detail || 'Request failed');
  }

  askBtn.disabled = false;
  askBtn.textContent = 'Ask';
}

function renderError(message) {
  results.innerHTML = `
    <div class="panel">
      <div class="label err">Error</div>
      <div class="err-block">${escapeHtml(message)}</div>
    </div>
  `;
}

function renderResults(data) {
  let html = `
    <div class="panel">
      <div class="label ok">Generated SQL</div>
      <div class="sql-block">${escapeHtml(data.generated_sql)}</div>
    </div>
  `;

  if (data.rows.length === 0) {
    html += `<div class="panel"><div class="empty-state">No rows returned.</div></div>`;
  } else {
    const columns = Object.keys(data.rows[0]);
    html += `<div class="panel"><div class="label ok">Results</div><div class="table-scroll"><table><thead><tr>`;
    columns.forEach(c => html += `<th>${escapeHtml(c)}</th>`);
    html += `</tr></thead><tbody>`;
    data.rows.forEach(row => {
      html += '<tr>';
      columns.forEach(c => html += `<td title="${escapeHtml(String(row[c]))}">${escapeHtml(String(row[c]))}</td>`);
      html += '</tr>';
    });
    html += `</tbody></table></div><div class="row-count">${data.row_count} row(s)</div></div>`;
  }

  results.innerHTML = html;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>
</body>
</html>
